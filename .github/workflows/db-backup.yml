name: Daily DB Backup
on:
  schedule:
    - cron: '0 15 * * *'  # 매일 자정 KST (UTC 15:00)
  workflow_dispatch:  # 수동 실행 가능

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL 17 client (Neon runs PG 17)
        # Neon DB가 PostgreSQL 17.8이므로 pg_dump도 17 이상 필요 (major version mismatch 방지).
        # Ubuntu 24.04 default postgresql-client는 16.x이고 /usr/bin/pg_dump가 16을 가리킴.
        # PostgreSQL official APT repo 추가 + postgresql-client-17 설치 후
        # /usr/lib/postgresql/17/bin을 GITHUB_PATH 앞쪽에 넣어 17이 우선되도록 함.
        run: |
          sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> $GITHUB_PATH
          /usr/lib/postgresql/17/bin/pg_dump --version
          /usr/lib/postgresql/17/bin/psql --version

      - name: Create backup
        env:
          # Neon pooled URL은 pg_dump가 정상 dump 못 하므로 unpooled(direct) URL 사용
          DATABASE_URL: ${{ secrets.DATABASE_URL_DIRECT }}
        run: |
          # Vercel env pull 시 trailing whitespace/newline이 secret에 섞여 들어가
          # pg_dump는 통과하나 psql이 sslmode 파싱에서 깨지므로 명시적으로 정리.
          CLEAN_URL=$(printf %s "$DATABASE_URL" | tr -d '[:space:]')
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FILENAME="backup_${TIMESTAMP}.sql.gz"
          pg_dump "$CLEAN_URL" | gzip > "$FILENAME"
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV
          echo "Backup created: $FILENAME ($(du -h $FILENAME | cut -f1))"

      - name: Upload to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}
          path: ${{ env.FILENAME }}
          retention-days: 30

      - name: Verify backup
        env:
          # Neon pooled URL은 pg_dump가 정상 dump 못 하므로 unpooled(direct) URL 사용
          DATABASE_URL: ${{ secrets.DATABASE_URL_DIRECT }}
        run: |
          CLEAN_URL=$(printf %s "$DATABASE_URL" | tr -d '[:space:]')
          # 테이블 수 확인
          TABLE_COUNT=$(psql "$CLEAN_URL" -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public'" | tr -d '[:space:]')
          echo "Tables in DB: $TABLE_COUNT"

          # 백업 파일 크기 확인
          BACKUP_SIZE=$(du -h ${{ env.FILENAME }} | cut -f1)
          echo "Backup size: $BACKUP_SIZE"

          if [ "$TABLE_COUNT" -lt 5 ]; then
            echo "ERROR: Less than 5 tables found!"
            exit 1
          fi
          # 백업 크기 sanity (1KB 미만이면 의심)
          BYTES=$(stat -c%s ${{ env.FILENAME }})
          if [ "$BYTES" -lt 1024 ]; then
            echo "ERROR: backup smaller than 1KB ($BYTES bytes) — likely empty"
            exit 1
          fi
