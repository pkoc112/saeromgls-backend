name: Daily DB Backup
on:
  schedule:
    - cron: '0 15 * * *'  # 매일 자정 KST (UTC 15:00)
  workflow_dispatch:  # 수동 실행 가능

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Create backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FILENAME="backup_${TIMESTAMP}.sql.gz"
          pg_dump "$DATABASE_URL" | gzip > "$FILENAME"
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV
          echo "Backup created: $FILENAME ($(du -h $FILENAME | cut -f1))"

      - name: Upload to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}
          path: ${{ env.FILENAME }}
          retention-days: 30

      - name: Verify backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # 테이블 수 확인
          TABLE_COUNT=$(psql "$DATABASE_URL" -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public'")
          echo "Tables in DB: $TABLE_COUNT"

          # 백업 파일 크기 확인
          BACKUP_SIZE=$(du -h ${{ env.FILENAME }} | cut -f1)
          echo "Backup size: $BACKUP_SIZE"

          if [ "$TABLE_COUNT" -lt 5 ]; then
            echo "WARNING: Less than 5 tables found!"
            exit 1
          fi
